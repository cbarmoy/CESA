name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']
        exclude:
          # Windows avec Python 3.9 peut avoir des problèmes de dépendances
          - os: windows-latest
            python-version: '3.9'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install system dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check imports
      run: |
        python -c "import CESA; import core; print('✅ All modules imported successfully')"

    - name: Verify dependencies
      run: |
        python -c "
        import sys
        required = ['mne', 'numpy', 'matplotlib', 'scipy', 'pandas', 'yasa']
        missing = []
        for pkg in required:
            try:
                __import__(pkg)
                print(f'✅ {pkg}')
            except ImportError:
                missing.append(pkg)
                print(f'❌ {pkg}')
        if missing:
            sys.exit(1)
        "

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint black isort mypy

    - name: Run flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true

    - name: Check code formatting with black
      run: |
        black --check . || true

    - name: Check import sorting with isort
      run: |
        isort --check-only . || true

  check-requirements:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Validate requirements.txt
      run: |
        python -m pip install --upgrade pip
        pip install pipreqs
        # Vérifier que requirements.txt est valide
        pip install -r requirements.txt --dry-run || true
        echo "✅ requirements.txt format is valid"

